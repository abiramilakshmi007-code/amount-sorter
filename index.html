<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contribution Tracker</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
padding:10px;
}

.container{
background:white;
padding:20px;
max-width:500px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:6px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:8px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

#total{
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Contribution Leaderboard</h2>

<input type="text" id="name" placeholder="Enter Name">
<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="addData()">Add Entry</button>
<button onclick="clearData()">Clear All</button>

<h3 id="total"></h3>

<table id="table">
<tr>
<th>Rank</th>
<th>Name</th>
<th>Amount</th>
</tr>
</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("contributions")) || [];

function saveData(){
localStorage.setItem("contributions", JSON.stringify(data));
}

function addData(){

let name=document.getElementById("name").value;
let amount=parseInt(document.getElementById("amount").value);

if(name=="" || amount==""){
alert("Enter name and amount");
return;
}

data.push({name:name,amount:amount});

sortData();
saveData();
display();

document.getElementById("name").value="";
document.getElementById("amount").value="";
}

function sortData(){

data.sort(function(a,b){

if(b.amount===a.amount){
return a.name.localeCompare(b.name);
}

return b.amount-a.amount;

});

}

function display(){

let table=document.getElementById("table");

table.innerHTML="<tr><th>Rank</th><th>Name</th><th>Amount</th></tr>";

let total=0;

for(let i=0;i<data.length;i++){

total+=data[i].amount;

table.innerHTML+=
"<tr><td>"+(i+1)+"</td><td>"+data[i].name+"</td><td>"+data[i].amount+"</td></tr>";

}

document.getElementById("total").innerText="Total Collected: ₹"+total;

}

function clearData(){

if(confirm("Delete all data?")){
data=[];
saveData();
display();
}

}

sortData();
display();

</script>

</body>
</html>
